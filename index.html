<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>古诗词填空</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f5f0e8;--card:#fffef9;--primary:#6b4c3b;--primary-light:#a08060;
  --accent:#c0392b;--text:#2c1810;--text-light:#7d6b5d;--border:#d4c5b5;
  --correct:#27ae60;--correct-bg:rgba(39,174,96,.08);
  --wrong:#e74c3c;--wrong-bg:rgba(231,76,60,.08);
  --shadow:0 2px 16px rgba(44,24,16,.06);--radius:16px;
}
html,body{width:100%;min-height:100%;min-height:100dvh}
body{
  font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei","Noto Sans SC",sans-serif;
  background:var(--bg);color:var(--text);
  display:flex;flex-direction:column;align-items:center;
  padding-bottom:40px;
  background-image:radial-gradient(circle at 20% 50%,rgba(107,76,59,.03) 0%,transparent 50%),
                   radial-gradient(circle at 80% 20%,rgba(192,57,43,.03) 0%,transparent 50%);
}
header{width:100%;max-width:800px;padding:20px 16px 8px;text-align:center}
.header-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
h1{font-size:clamp(1.5rem,6vw,2.2rem);font-weight:700;color:var(--primary);letter-spacing:.15em}
.subtitle{font-size:clamp(.8rem,2.5vw,.9rem);color:var(--text-light);margin-bottom:10px}
.bgm-btn{
  font-size:1.2rem;background:none;border:1px solid var(--border);border-radius:8px;
  cursor:pointer;padding:4px 8px;transition:all .15s;
  -webkit-tap-highlight-color:transparent;min-height:36px;
}
.bgm-btn.bgm-on{background:var(--primary);color:#fff;border-color:var(--primary)}
.stats{
  display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-bottom:10px;
  font-size:clamp(.8rem,2.5vw,.9rem);color:var(--text-light);
}
.stats span{font-weight:600;color:var(--primary)}
.mode-select{display:flex;gap:6px;justify-content:center;margin-bottom:8px}
.mode-btn{
  padding:4px 16px;border-radius:20px;border:1.5px solid var(--primary);
  background:transparent;font-size:clamp(.82rem,2.2vw,.9rem);cursor:pointer;
  color:var(--primary);transition:all .15s;font-family:inherit;
  -webkit-tap-highlight-color:transparent;min-height:32px;
}
.mode-btn.active{background:var(--primary);color:#fff}
.difficulty{display:flex;gap:6px;justify-content:center;margin-bottom:8px}
.diff-btn{
  padding:4px 14px;border-radius:20px;border:1px solid var(--border);
  background:transparent;font-size:clamp(.75rem,2.2vw,.82rem);cursor:pointer;
  color:var(--text-light);transition:all .15s;font-family:inherit;
  -webkit-tap-highlight-color:transparent;min-height:30px;
}
.diff-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.grade-filter{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:10px}
.grade-btn{
  padding:3px 12px;border-radius:14px;border:1px solid var(--border);
  background:transparent;font-size:clamp(.72rem,2.2vw,.78rem);cursor:pointer;
  color:var(--text-light);transition:all .15s;font-family:inherit;
  -webkit-tap-highlight-color:transparent;min-height:28px;
}
.grade-btn.active{background:var(--primary-light);color:#fff;border-color:var(--primary-light)}
.controls{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:8px}
.btn{
  padding:8px 18px;border:1.5px solid var(--primary);border-radius:8px;
  background:transparent;color:var(--primary);font-size:clamp(.85rem,2.5vw,.95rem);
  cursor:pointer;transition:all .15s;font-family:inherit;
  -webkit-tap-highlight-color:transparent;user-select:none;min-height:40px;
  display:inline-flex;align-items:center;justify-content:center;
}
.btn:active{transform:scale(.96)}
.btn:disabled{opacity:.35;pointer-events:none}
.btn.primary{background:var(--primary);color:#fff}
.btn.primary:active{background:#5a3f30}
.btn.accent{border-color:var(--accent);color:var(--accent)}
.btn.accent:active{background:var(--accent);color:#fff}
.btn.green{border-color:var(--correct);color:var(--correct)}
.btn.green:active{background:var(--correct);color:#fff}
.card{
  width:calc(100% - 24px);max-width:800px;background:var(--card);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:clamp(16px,4vw,36px);margin:0 12px 24px;
  position:relative;overflow:hidden;
}
.card::before{
  content:"";position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--primary),var(--accent),var(--primary));
}
.poem-header{text-align:center;margin-bottom:20px}
.poem-title{font-size:clamp(1.1rem,4vw,1.5rem);font-weight:600;color:var(--text)}
.poem-author{font-size:clamp(.8rem,2.5vw,.9rem);color:var(--text-light);margin-top:3px}
.poem-body{
  display:flex;flex-direction:column;align-items:center;gap:10px;
  font-size:clamp(1.05rem,3.5vw,1.4rem);line-height:2;text-align:center;
}
.line{display:flex;flex-wrap:wrap;justify-content:center;gap:2px;letter-spacing:.08em}
.char{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:1.3em;height:1.5em;padding:0 2px;border-radius:4px;
}
/* Fill-in blanks */
.blank-group{
  display:inline-flex;gap:1px;border-bottom:2.5px solid var(--primary);
  background:rgba(107,76,59,.04);border-radius:4px 4px 0 0;padding:0 3px;margin:0 1px;
}
.blank-group .blank{border-bottom:none;min-width:1.3em;background:transparent}
.blank{
  min-width:1.4em;border-bottom:2.5px solid var(--primary);
  background:rgba(107,76,59,.04);position:relative;
}
.blank input{
  width:1.2em;min-width:1.2em;height:1.2em;border:none;background:transparent;
  text-align:center;font-size:inherit;font-family:inherit;color:var(--text);
  outline:none;padding:0;-webkit-tap-highlight-color:transparent;
}
.blank input::placeholder{color:var(--border);font-size:.7em}
.blank.filled{border-bottom-color:var(--primary-light)}
.blank.correct{border-bottom-color:var(--correct);background:var(--correct-bg)}
.blank.correct input{color:var(--correct)}
.blank.wrong{border-bottom-color:var(--wrong);background:var(--wrong-bg)}
.blank.wrong input{color:var(--wrong)}
.blank .answer-text{color:var(--correct);font-weight:600;display:inline}
/* Choice mode */
.choice-options{
  display:grid;grid-template-columns:1fr 1fr;gap:12px;
  margin-top:20px;max-width:400px;margin-left:auto;margin-right:auto;
}
.choice-btn{
  padding:16px;border:2px solid var(--border);border-radius:12px;
  background:var(--card);font-size:1.5rem;cursor:pointer;transition:all .15s;
  font-family:inherit;-webkit-tap-highlight-color:transparent;min-height:56px;
}
.choice-btn:active{transform:scale(.96)}
.choice-btn:hover:not(:disabled){border-color:var(--primary);box-shadow:var(--shadow)}
.choice-btn.choice-correct{background:var(--correct-bg);border-color:var(--correct);color:var(--correct)}
.choice-btn.choice-wrong{background:var(--wrong-bg);border-color:var(--wrong);color:var(--wrong)}
.choice-btn:disabled{cursor:default;opacity:.7}
/* Learning mode */
.learn-mode .char{animation:fadeIn .3s ease both}
.learn-mode .line{padding:4px 0}
.speak-btn{
  display:inline-flex;align-items:center;gap:4px;
  padding:4px 12px;border:1px solid var(--primary-light);border-radius:20px;
  background:transparent;color:var(--primary);font-size:.78rem;cursor:pointer;
  margin-top:6px;font-family:inherit;-webkit-tap-highlight-color:transparent;min-height:28px;
}
.speak-btn:active{background:rgba(107,76,59,.08)}
.speak-btn.speaking{background:var(--primary);color:#fff}
.hint-text{
  text-align:center;font-size:.82rem;color:var(--text-light);
  margin-top:8px;min-height:1.2em;
}
.result{
  text-align:center;margin-top:14px;padding:10px 16px;border-radius:8px;
  font-size:clamp(.88rem,2.5vw,.98rem);display:none;
}
.result.show{display:block}
.result.pass{background:var(--correct-bg);color:var(--correct)}
.result.fail{background:var(--wrong-bg);color:var(--wrong)}
/* Reward overlay */
.reward-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:9999;pointer-events:none;opacity:0;transition:opacity .3s;
}
.reward-overlay.show{opacity:1;pointer-events:auto}
.reward-overlay .big-icon{
  font-size:clamp(80px,20vw,160px);
  animation:rewardPop .6s cubic-bezier(.175,.885,.32,1.275) both;
}
.reward-overlay .big-text{
  font-size:clamp(24px,6vw,42px);font-weight:900;color:var(--correct);
  text-shadow:0 2px 20px rgba(39,174,96,.3);
  animation:rewardSlide .5s .2s ease both;
}
.reward-overlay .sub-text{
  font-size:clamp(14px,3.5vw,20px);color:var(--primary-light);
  margin-top:8px;animation:rewardSlide .5s .35s ease both;
}
.particle{
  position:fixed;width:10px;height:10px;border-radius:50%;
  pointer-events:none;z-index:9998;animation:particleFall 1.5s ease-out forwards;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes rewardPop{
  0%{transform:scale(0) rotate(-20deg);opacity:0}
  60%{transform:scale(1.3) rotate(5deg);opacity:1}
  100%{transform:scale(1) rotate(0)}
}
@keyframes rewardSlide{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes particleFall{
  0%{transform:translate(0,0) rotate(0);opacity:1}
  100%{transform:translate(var(--dx),var(--dy)) rotate(720deg);opacity:0}
}
@media(max-width:480px){
  .card{margin:0 8px 20px;padding:14px;border-radius:12px}
  .stats{gap:8px;font-size:.78rem}
  .btn{padding:7px 12px;font-size:.82rem;min-height:36px}
  .controls,.difficulty,.grade-filter,.mode-select{gap:5px}
  .poem-body{gap:8px}
  .blank-group{gap:0}
  .choice-options{gap:8px}
  .choice-btn{padding:12px;font-size:1.3rem;min-height:48px}
}
</style>
</head>
<body>

<header>
  <div class="header-row">
    <div>
      <h1>古诗词填空</h1>
      <p class="subtitle">中小学必背古诗</p>
    </div>
    <button class="bgm-btn" id="bgmBtn" title="背景音乐">🔇</button>
  </div>
  <div class="stats">
    第 <span id="roundNum">1</span> 题
    &nbsp;|&nbsp; 得分 <span id="scoreNum">0</span>
    &nbsp;|&nbsp; 正确率 <span id="accuracyNum">0%</span>
    &nbsp;|&nbsp; 🔥<span id="streakNum">0</span>
  </div>
  <div class="mode-select">
    <button class="mode-btn active" data-mode="single">单空</button>
    <button class="mode-btn" data-mode="multi">多空</button>
    <button class="mode-btn" data-mode="choice">选择</button>
  </div>
  <div class="difficulty">
    <button class="diff-btn active" data-diff="easy">简单</button>
    <button class="diff-btn" data-diff="medium">中等</button>
    <button class="diff-btn" data-diff="hard">困难</button>
  </div>
  <div class="grade-filter">
    <button class="grade-btn active" data-grade="all">全部</button>
    <button class="grade-btn" data-grade="primary">小学</button>
    <button class="grade-btn" data-grade="middle">初中</button>
  </div>
  <div class="controls">
    <button class="btn green" id="learnBtn">学习模式</button>
    <button class="btn" id="hintBtn" disabled>提示</button>
    <button class="btn primary" id="checkBtn" disabled>检查答案</button>
    <button class="btn" id="nextBtn" disabled>下一题</button>
  </div>
</header>

<div class="card">
  <div class="poem-header">
    <div class="poem-title" id="poemTitle"></div>
    <div class="poem-author" id="poemAuthor"></div>
  </div>
  <div class="poem-body" id="poemBody"></div>
  <div class="hint-text" id="hintText">选择模式后点击「下一题」开始挑战</div>
  <div class="result" id="result"></div>
</div>

<div class="reward-overlay" id="rewardOverlay">
  <div class="big-icon" id="rewardIcon"></div>
  <div class="big-text" id="rewardText"></div>
  <div class="sub-text" id="rewardSub"></div>
</div>

<script>
// ===== 古诗词数据 =====
var poems=[
// --- 小学部分 ---
{title:"咏鹅",author:"骆宾王",dynasty:"唐",grade:"primary",
 text:"鹅鹅鹅，曲项向天歌。白毛浮绿水，红掌拨清波。"},
{title:"江南",author:"汉乐府",dynasty:"汉",grade:"primary",
 text:"江南可采莲，莲叶何田田。鱼戏莲叶间，鱼戏莲叶东，鱼戏莲叶西，鱼戏莲叶南，鱼戏莲叶北。"},
{title:"画",author:"王维",dynasty:"唐",grade:"primary",
 text:"远看山有色，近听水无声。春去花还在，人来鸟不惊。"},
{title:"悯农（其二）",author:"李绅",dynasty:"唐",grade:"primary",
 text:"锄禾日当午，汗滴禾下土。谁知盘中餐，粒粒皆辛苦。"},
{title:"悯农（其一）",author:"李绅",dynasty:"唐",grade:"primary",
 text:"春种一粒粟，秋收万颗子。四海无闲田，农夫犹饿死。"},
{title:"春晓",author:"孟浩然",dynasty:"唐",grade:"primary",
 text:"春眠不觉晓，处处闻啼鸟。夜来风雨声，花落知多少。"},
{title:"静夜思",author:"李白",dynasty:"唐",grade:"primary",
 text:"床前明月光，疑是地上霜。举头望明月，低头思故乡。"},
{title:"登鹳雀楼",author:"王之涣",dynasty:"唐",grade:"primary",
 text:"白日依山尽，黄河入海流。欲穷千里目，更上一层楼。"},
{title:"寻隐者不遇",author:"贾岛",dynasty:"唐",grade:"primary",
 text:"松下问童子，言师采药去。只在此山中，云深不知处。"},
{title:"小池",author:"杨万里",dynasty:"宋",grade:"primary",
 text:"泉眼无声惜细流，树阴照水爱晴柔。小荷才露尖尖角，早有蜻蜓立上头。"},
{title:"池上",author:"白居易",dynasty:"唐",grade:"primary",
 text:"小娃撑小艇，偷采白莲回。不解藏踪迹，浮萍一道开。"},
{title:"梅花",author:"王安石",dynasty:"宋",grade:"primary",
 text:"墙角数枝梅，凌寒独自开。遥知不是雪，为有暗香来。"},
{title:"小儿垂钓",author:"胡令能",dynasty:"唐",grade:"primary",
 text:"蓬头稚子学垂纶，侧坐莓苔草映身。路人借问遥招手，怕得鱼惊不应人。"},
{title:"所见",author:"袁枚",dynasty:"清",grade:"primary",
 text:"牧童骑黄牛，歌声振林樾。意欲捕鸣蝉，忽然闭口立。"},
{title:"村居",author:"高鼎",dynasty:"清",grade:"primary",
 text:"草长莺飞二月天，拂堤杨柳醉春烟。儿童散学归来早，忙趁东风放纸鸢。"},
{title:"赋得古原草送别",author:"白居易",dynasty:"唐",grade:"primary",
 text:"离离原上草，一岁一枯荣。野火烧不尽，春风吹又生。"},
{title:"宿新市徐公店",author:"杨万里",dynasty:"宋",grade:"primary",
 text:"篱落疏疏一径深，树头新绿未成阴。儿童急走追黄蝶，飞入菜花无处寻。"},
{title:"望庐山瀑布",author:"李白",dynasty:"唐",grade:"primary",
 text:"日照香炉生紫烟，遥看瀑布挂前川。飞流直下三千尺，疑是银河落九天。"},
{title:"绝句（两个黄鹂）",author:"杜甫",dynasty:"唐",grade:"primary",
 text:"两个黄鹂鸣翠柳，一行白鹭上青天。窗含西岭千秋雪，门泊东吴万里船。"},
{title:"夜书所见",author:"叶绍翁",dynasty:"宋",grade:"primary",
 text:"萧萧梧叶送寒声，江上秋风动客情。知有儿童挑促织，夜深篱落一灯明。"},
{title:"九月九日忆山东兄弟",author:"王维",dynasty:"唐",grade:"primary",
 text:"独在异乡为异客，每逢佳节倍思亲。遥知兄弟登高处，遍插茱萸少一人。"},
{title:"望天门山",author:"李白",dynasty:"唐",grade:"primary",
 text:"天门中断楚江开，碧水东流至此回。两岸青山相对出，孤帆一片日边来。"},
{title:"饮湖上初晴后雨",author:"苏轼",dynasty:"宋",grade:"primary",
 text:"水光潋滟晴方好，山色空蒙雨亦奇。欲把西湖比西子，淡妆浓抹总相宜。"},
{title:"题西林壁",author:"苏轼",dynasty:"宋",grade:"primary",
 text:"横看成岭侧成峰，远近高低各不同。不识庐山真面目，只缘身在此山中。"},
{title:"夏日绝句",author:"李清照",dynasty:"宋",grade:"primary",
 text:"生当作人杰，死亦为鬼雄。至今思项羽，不肯过江东。"},
{title:"四时田园杂兴（其二十五）",author:"范成大",dynasty:"宋",grade:"primary",
 text:"梅子金黄杏子肥，麦花雪白菜花稀。日长篱落无人过，惟有蜻蜓蛱蝶飞。"},
{title:"四时田园杂兴（其三十一）",author:"范成大",dynasty:"宋",grade:"primary",
 text:"昼出耘田夜绩麻，村庄儿女各当家。童孙未解供耕织，也傍桑阴学种瓜。"},
{title:"寒食",author:"韩翃",dynasty:"唐",grade:"primary",
 text:"春城无处不飞花，寒食东风御柳斜。日暮汉宫传蜡烛，轻烟散入五侯家。"},
{title:"清明",author:"杜牧",dynasty:"唐",grade:"primary",
 text:"清明时节雨纷纷，路上行人欲断魂。借问酒家何处有，牧童遥指杏花村。"},
{title:"迢迢牵牛星",author:"古诗十九首",dynasty:"汉",grade:"primary",
 text:"迢迢牵牛星，皎皎河汉女。纤纤擢素手，札札弄机杼。终日不成章，泣涕零如雨。河汉清且浅，相去复几许。盈盈一水间，脉脉不得语。"},
{title:"十五夜望月",author:"王建",dynasty:"唐",grade:"primary",
 text:"中庭地白树栖鸦，冷露无声湿桂花。今夜月明人尽望，不知秋思落谁家。"},
{title:"长歌行",author:"汉乐府",dynasty:"汉",grade:"primary",
 text:"青青园中葵，朝露待日晞。阳春布德泽，万物生光辉。常恐秋节至，焜黄华叶衰。百川东到海，何时复西归。少壮不努力，老大徒伤悲。"},
{title:"出塞",author:"王昌龄",dynasty:"唐",grade:"primary",
 text:"秦时明月汉时关，万里长征人未还。但使龙城飞将在，不教胡马度阴山。"},
{title:"凉州词",author:"王翰",dynasty:"唐",grade:"primary",
 text:"葡萄美酒夜光杯，欲饮琵琶马上催。醉卧沙场君莫笑，古来征战几人回。"},
{title:"芙蓉楼送辛渐",author:"王昌龄",dynasty:"唐",grade:"primary",
 text:"寒雨连江夜入吴，平明送客楚山孤。洛阳亲友如相问，一片冰心在玉壶。"},
{title:"送元二使安西",author:"王维",dynasty:"唐",grade:"primary",
 text:"渭城朝雨浥轻尘，客舍青青柳色新。劝君更尽一杯酒，西出阳关无故人。"},
{title:"别董大",author:"高适",dynasty:"唐",grade:"primary",
 text:"千里黄云白日曛，北风吹雁雪纷纷。莫愁前路无知己，天下谁人不识君。"},
{title:"赠汪伦",author:"李白",dynasty:"唐",grade:"primary",
 text:"李白乘舟将欲行，忽闻岸上踏歌声。桃花潭水深千尺，不及汪伦送我情。"},
{title:"黄鹤楼送孟浩然之广陵",author:"李白",dynasty:"唐",grade:"primary",
 text:"故人西辞黄鹤楼，烟花三月下扬州。孤帆远影碧空尽，唯见长江天际流。"},
{title:"早发白帝城",author:"李白",dynasty:"唐",grade:"primary",
 text:"朝辞白帝彩云间，千里江陵一日还。两岸猿声啼不住，轻舟已过万重山。"},
{title:"绝句（迟日江山丽）",author:"杜甫",dynasty:"唐",grade:"primary",
 text:"迟日江山丽，春风花草香。泥融飞燕子，沙暖睡鸳鸯。"},
{title:"江畔独步寻花",author:"杜甫",dynasty:"唐",grade:"primary",
 text:"黄师塔前江水东，春光懒困倚微风。桃花一簇开无主，可爱深红爱浅红。"},
{title:"游园不值",author:"叶绍翁",dynasty:"宋",grade:"primary",
 text:"应怜屐齿印苍苔，小扣柴扉久不开。春色满园关不住，一枝红杏出墙来。"},
{title:"卜算子·咏梅",author:"毛泽东",dynasty:"现代",grade:"primary",
 text:"风雨送春归，飞雪迎春到。已是悬崖百丈冰，犹有花枝俏。俏也不争春，只把春来报。待到山花烂漫时，她在丛中笑。"},
{title:"卜算子·咏梅",author:"陆游",dynasty:"宋",grade:"primary",
 text:"驿外断桥边，寂寞开无主。已是黄昏独自愁，更着风和雨。无意苦争春，一任群芳妒。零落成泥碾作尘，只有香如故。"},
{title:"石灰吟",author:"于谦",dynasty:"明",grade:"primary",
 text:"千锤万凿出深山，烈火焚烧若等闲。粉骨碎身浑不怕，要留清白在人间。"},
{title:"竹石",author:"郑燮",dynasty:"清",grade:"primary",
 text:"咬定青山不放松，立根原在破岩中。千磨万击还坚劲，任尔东西南北风。"},
{title:"墨梅",author:"王冕",dynasty:"元",grade:"primary",
 text:"我家洗砚池头树，朵朵花开淡墨痕。不要人夸好颜色，只留清气满乾坤。"},
{title:"马诗",author:"李贺",dynasty:"唐",grade:"primary",
 text:"大漠沙如雪，燕山月似钩。何当金络脑，快走踏清秋。"},
{title:"浪淘沙（其一）",author:"刘禹锡",dynasty:"唐",grade:"primary",
 text:"九曲黄河万里沙，浪淘风簸自天涯。如今直上银河去，同到牵牛织女家。"},
{title:"书湖阴先生壁",author:"王安石",dynasty:"宋",grade:"primary",
 text:"茅檐长扫净无苔，花木成畦手自栽。一水护田将绿绕，两山排闼送青来。"},
{title:"春日",author:"朱熹",dynasty:"宋",grade:"primary",
 text:"胜日寻芳泗水滨，无边光景一时新。等闲识得东风面，万紫千红总是春。"},
{title:"回乡偶书",author:"贺知章",dynasty:"唐",grade:"primary",
 text:"少小离家老大回，乡音无改鬓毛衰。儿童相见不相识，笑问客从何处来。"},
{title:"咏柳",author:"贺知章",dynasty:"唐",grade:"primary",
 text:"碧玉妆成一树高，万条垂下绿丝绦。不知细叶谁裁出，二月春风似剪刀。"},
{title:"凉州词",author:"王之涣",dynasty:"唐",grade:"primary",
 text:"黄河远上白云间，一片孤城万仞山。羌笛何须怨杨柳，春风不度玉门关。"},
{title:"枫桥夜泊",author:"张继",dynasty:"唐",grade:"primary",
 text:"月落乌啼霜满天，江枫渔火对愁眠。姑苏城外寒山寺，夜半钟声到客船。"},
{title:"渔歌子",author:"张志和",dynasty:"唐",grade:"primary",
 text:"西塞山前白鹭飞，桃花流水鳜鱼肥。青箬笠，绿蓑衣，斜风细雨不须归。"},
{title:"望洞庭",author:"刘禹锡",dynasty:"唐",grade:"primary",
 text:"湖光秋月两相和，潭面无风镜未磨。遥望洞庭山水翠，白银盘里一青螺。"},
{title:"浪淘沙（其七）",author:"刘禹锡",dynasty:"唐",grade:"primary",
 text:"八月涛声吼地来，头高数丈触山回。须臾却入海门去，卷起沙堆似雪堆。"},
{title:"蜂",author:"罗隐",dynasty:"唐",grade:"primary",
 text:"不论平地与山尖，无限风光尽被占。采得百花成蜜后，为谁辛苦为谁甜。"},
{title:"江上渔者",author:"范仲淹",dynasty:"宋",grade:"primary",
 text:"江上往来人，但爱鲈鱼美。君看一叶舟，出没风波里。"},
{title:"元日",author:"王安石",dynasty:"宋",grade:"primary",
 text:"爆竹声中一岁除，春风送暖入屠苏。千门万户曈曈日，总把新桃换旧符。"},
{title:"秋夜将晓出篱门迎凉有感",author:"陆游",dynasty:"宋",grade:"primary",
 text:"三万里河东入海，五千仞岳上摩天。遗民泪尽胡尘里，南望王师又一年。"},
{title:"示儿",author:"陆游",dynasty:"宋",grade:"primary",
 text:"死去元知万事空，但悲不见九州同。王师北定中原日，家祭无忘告乃翁。"},
{title:"题临安邸",author:"林升",dynasty:"宋",grade:"primary",
 text:"山外青山楼外楼，西湖歌舞几时休。暖风熏得游人醉，直把杭州作汴州。"},
{title:"己亥杂诗",author:"龚自珍",dynasty:"清",grade:"primary",
 text:"九州生气恃风雷，万马齐喑究可哀。我劝天公重抖擞，不拘一格降人才。"},
{title:"过故人庄",author:"孟浩然",dynasty:"唐",grade:"primary",
 text:"故人具鸡黍，邀我至田家。绿树村边合，青山郭外斜。开轩面场圃，把酒话桑麻。待到重阳日，还来就菊花。"},
{title:"从军行",author:"王昌龄",dynasty:"唐",grade:"primary",
 text:"青海长云暗雪山，孤城遥望玉门关。黄沙百战穿金甲，不破楼兰终不还。"},
{title:"闻官军收河南河北",author:"杜甫",dynasty:"唐",grade:"primary",
 text:"剑外忽传收蓟北，初闻涕泪满衣裳。却看妻子愁何在，漫卷诗书喜欲狂。白日放歌须纵酒，青春作伴好还乡。即从巴峡穿巫峡，便下襄阳向洛阳。"},
{title:"春夜喜雨",author:"杜甫",dynasty:"唐",grade:"primary",
 text:"好雨知时节，当春乃发生。随风潜入夜，润物细无声。野径云俱黑，江船火独明。晓看红湿处，花重锦官城。"},
{title:"西江月·夜行黄沙道中",author:"辛弃疾",dynasty:"宋",grade:"primary",
 text:"明月别枝惊鹊，清风半夜鸣蝉。稻花香里说丰年，听取蛙声一片。七八个星天外，两三点雨山前。旧时茅店社林边，路转溪桥忽见。"},
{title:"天净沙·秋思",author:"马致远",dynasty:"元",grade:"primary",
 text:"枯藤老树昏鸦，小桥流水人家，古道西风瘦马。夕阳西下，断肠人在天涯。"},
{title:"朝天子·咏喇叭",author:"王磐",dynasty:"明",grade:"primary",
 text:"喇叭，唢呐，曲儿小腔儿大。官船来往乱如麻，全仗你抬声价。军听了军愁，民听了民怕。哪里去辨甚么真共假？眼见的吹翻了这家，吹伤了那家，只吹的水尽鹅飞罢！"},
// --- 初中部分 ---
{title:"观沧海",author:"曹操",dynasty:"东汉",grade:"middle",
 text:"东临碣石，以观沧海。水何澹澹，山岛竦峙。树木丛生，百草丰茂。秋风萧瑟，洪波涌起。日月之行，若出其中。星汉灿烂，若出其里。幸甚至哉，歌以咏志。"},
{title:"次北固山下",author:"王湾",dynasty:"唐",grade:"middle",
 text:"客路青山外，行舟绿水前。潮平两岸阔，风正一帆悬。海日生残夜，江春入旧年。乡书何处达，归雁洛阳边。"},
{title:"钱塘湖春行",author:"白居易",dynasty:"唐",grade:"middle",
 text:"孤山寺北贾亭西，水面初平云脚低。几处早莺争暖树，谁家新燕啄春泥。乱花渐欲迷人眼，浅草才能没马蹄。最爱湖东行不足，绿杨阴里白沙堤。"},
{title:"使至塞上",author:"王维",dynasty:"唐",grade:"middle",
 text:"单车欲问边，属国过居延。征蓬出汉塞，归雁入胡天。大漠孤烟直，长河落日圆。萧关逢候骑，都护在燕然。"},
{title:"闻王昌龄左迁龙标遥有此寄",author:"李白",dynasty:"唐",grade:"middle",
 text:"杨花落尽子规啼，闻道龙标过五溪。我寄愁心与明月，随君直到夜郎西。"},
{title:"夜雨寄北",author:"李商隐",dynasty:"唐",grade:"middle",
 text:"君问归期未有期，巴山夜雨涨秋池。何当共剪西窗烛，却话巴山夜雨时。"},
{title:"泊秦淮",author:"杜牧",dynasty:"唐",grade:"middle",
 text:"烟笼寒水月笼沙，夜泊秦淮近酒家。商女不知亡国恨，隔江犹唱后庭花。"},
{title:"浣溪沙",author:"晏殊",dynasty:"宋",grade:"middle",
 text:"一曲新词酒一杯，去年天气旧亭台。夕阳西下几时回。无可奈何花落去，似曾相识燕归来。小园香径独徘徊。"},
{title:"过松源晨炊漆公店",author:"杨万里",dynasty:"宋",grade:"middle",
 text:"莫言下岭便无难，赚得行人错喜欢。政入万山围子里，一山放出一山拦。"},
{title:"约客",author:"赵师秀",dynasty:"宋",grade:"middle",
 text:"黄梅时节家家雨，青草池塘处处蛙。有约不来过夜半，闲敲棋子落灯花。"},
{title:"如梦令",author:"李清照",dynasty:"宋",grade:"middle",
 text:"常记溪亭日暮，沉醉不知归路。兴尽晚回舟，误入藕花深处。争渡，争渡，惊起一滩鸥鹭。"},
{title:"登幽州台歌",author:"陈子昂",dynasty:"唐",grade:"middle",
 text:"前不见古人，后不见来者。念天地之悠悠，独怆然而涕下。"},
{title:"望岳",author:"杜甫",dynasty:"唐",grade:"middle",
 text:"岱宗夫如何，齐鲁青未了。造化钟神秀，阴阳割昏晓。荡胸生曾云，决眦入归鸟。会当凌绝顶，一览众山小。"},
{title:"登飞来峰",author:"王安石",dynasty:"宋",grade:"middle",
 text:"飞来山上千寻塔，闻说鸡鸣见日升。不畏浮云遮望眼，自缘身在最高层。"},
{title:"游山西村",author:"陆游",dynasty:"宋",grade:"middle",
 text:"莫笑农家腊酒浑，丰年留客足鸡豚。山重水复疑无路，柳暗花明又一村。箫鼓追随春社近，衣冠简朴古风存。从今若许闲乘月，拄杖无时夜叩门。"},
{title:"己亥杂诗（其五）",author:"龚自珍",dynasty:"清",grade:"middle",
 text:"浩荡离愁白日斜，吟鞭东指即天涯。落红不是无情物，化作春泥更护花。"},
{title:"赤壁",author:"杜牧",dynasty:"唐",grade:"middle",
 text:"折戟沉沙铁未销，自将磨洗认前朝。东风不与周郎便，铜雀春深锁二乔。"},
{title:"过零丁洋",author:"文天祥",dynasty:"宋",grade:"middle",
 text:"辛苦遭逢起一经，干戈寥落四周星。山河破碎风飘絮，身世浮沉雨打萍。惶恐滩头说惶恐，零丁洋里叹零丁。人生自古谁无死，留取丹心照汗青。"},
{title:"酬乐天扬州初逢席上见赠",author:"刘禹锡",dynasty:"唐",grade:"middle",
 text:"巴山楚水凄凉地，二十三年弃置身。怀旧空吟闻笛赋，到乡翻似烂柯人。沉舟侧畔千帆过，病树前头万木春。今日听君歌一曲，暂凭杯酒长精神。"},
{title:"水调歌头",author:"苏轼",dynasty:"宋",grade:"middle",
 text:"明月几时有，把酒问青天。不知天上宫阙，今夕是何年。我欲乘风归去，又恐琼楼玉宇，高处不胜寒。起舞弄清影，何似在人间。转朱阁，低绮户，照无眠。不应有恨，何事长向别时圆。人有悲欢离合，月有阴晴圆缺，此事古难全。但愿人长久，千里共婵娟。"},
{title:"山坡羊·潼关怀古",author:"张养浩",dynasty:"元",grade:"middle",
 text:"峰峦如聚，波涛如怒，山河表里潼关路。望西都，意踌躇。伤心秦汉经行处，宫阙万间都做了土。兴，百姓苦。亡，百姓苦。"},
{title:"饮酒（其五）",author:"陶渊明",dynasty:"东晋",grade:"middle",
 text:"结庐在人境，而无车马喧。问君何能尔，心远地自偏。采菊东篱下，悠然见南山。山气日夕佳，飞鸟相与还。此中有真意，欲辨已忘言。"},
{title:"春望",author:"杜甫",dynasty:"唐",grade:"middle",
 text:"国破山河在，城春草木深。感时花溅泪，恨别鸟惊心。烽火连三月，家书抵万金。白头搔更短，浑欲不胜簪。"},
{title:"雁门太守行",author:"李贺",dynasty:"唐",grade:"middle",
 text:"黑云压城城欲摧，甲光向日金鳞开。角声满天秋色里，塞上燕脂凝夜紫。半卷红旗临易水，霜重鼓寒声不起。报君黄金台上意，提携玉龙为君死。"},
{title:"关雎",author:"诗经",dynasty:"先秦",grade:"middle",
 text:"关关雎鸠，在河之洲。窈窕淑女，君子好逑。参差荇菜，左右流之。窈窕淑女，寤寐求之。求之不得，寤寐思服。悠哉悠哉，辗转反侧。参差荇菜，左右采之。窈窕淑女，琴瑟友之。参差荇菜，左右芼之。窈窕淑女，钟鼓乐之。"},
{title:"蒹葭",author:"诗经",dynasty:"先秦",grade:"middle",
 text:"蒹葭苍苍，白露为霜。所谓伊人，在水一方。溯洄从之，道阻且长。溯游从之，宛在水中央。蒹葭萋，白露未晞。所谓伊人，在水之湄。溯洄从之，道阻且跻。溯游从之，宛在水中坻。蒹葭采采，白露未已。所谓伊人，在水之涘。溯洄从之，道阻且右。溯游从之，宛在水中沚。"},
{title:"送杜少府之任蜀州",author:"王勃",dynasty:"唐",grade:"middle",
 text:"城阙辅三秦，风烟望五津。与君离别意，同是宦游人。海内存知己，天涯若比邻。无为在歧路，儿女共沾巾。"},
{title:"行路难（其一）",author:"李白",dynasty:"唐",grade:"middle",
 text:"金樽清酒斗十千，玉盘珍羞直万钱。停杯投箸不能食，拔剑四顾心茫然。欲渡黄河冰塞川，将登太行雪满山。闲来垂钓碧溪上，忽复乘舟梦日边。行路难，行路难，多歧路，今安在。长风破浪会有时，直挂云帆济沧海。"},
{title:"茅屋为秋风所破歌",author:"杜甫",dynasty:"唐",grade:"middle",
 text:"八月秋高风怒号，卷我屋上三重茅。茅飞渡江洒江郊，高者挂罥长林梢，下者飘转沉塘坳。南村群童欺我老无力，忍能对面为盗贼。公然抱茅入竹去，唇焦口燥呼不得。归来倚杖自叹息。俄顷风定云墨色，秋天漠漠向昏黑。布衾多年冷似铁，娇儿恶卧踏里裂。床头屋漏无干处，雨脚如麻未断绝。自经丧乱少睡眠，长夜沾湿何由彻。安得广厦千万间，大庇天下寒士俱欢颜。风雨不动安如山。呜呼，何时眼前突兀见此屋，吾庐独破受冻死亦足。"},
{title:"白雪歌送武判官归京",author:"岑参",dynasty:"唐",grade:"middle",
 text:"北风卷地白草折，胡天八月即飞雪。忽如一夜春风来，千树万树梨花开。散入珠帘湿罗幕，狐裘不暖锦衾薄。将军角弓不得控，都护铁衣冷难着。瀚海阑干百丈冰，愁云惨淡万里凝。中军置酒饮归客，胡琴琵琶与羌笛。纷纷暮雪下辕门，风掣红旗冻不翻。轮台东门送君去，去时雪满天山路。山回路转不见君，雪上空留马行处。"},
{title:"木兰诗",author:"北朝民歌",dynasty:"南北朝",grade:"middle",
 text:"唧唧复唧唧，木兰当户织。不闻机杼声，唯闻女叹息。问女何所思，问女何所忆。女亦无所思，女亦无所忆。昨夜见军帖，可汗大点兵。军书十二卷，卷卷有爷名。阿爷无大儿，木兰无长兄。愿为市鞍马，从此替爷征。东市买骏马，西市买鞍鞯。南市买辔头，北市买长鞭。旦辞爷娘去，暮宿黄河边。不闻爷娘唤女声，但闻黄河流水鸣溅溅。旦辞黄河去，暮至黑山头。不闻爷娘唤女声，但闻燕山胡骑鸣啾啾。万里赴戎机，关山度若飞。朔气传金柝，寒光照铁衣。将军百战死，壮士十年归。归来见天子，天子坐明堂。策勋十二转，赏赐百千强。可汗问所欲，木兰不用尚书郎。愿驰千里足，送儿还故乡。爷娘闻女来，出郭相扶将。阿姊闻妹来，当户理红妆。小弟闻姊来，磨刀霍霍向猪羊。开我东阁门，坐我西阁床。脱我战时袍，著我旧时裳。当窗理云鬓，对镜帖花黄。出门看火伴，火伴皆惊忙。同行十二年，不知木兰是女郎。雄兔脚扑朔，雌兔眼迷离。双兔傍地走，安能辨我是雄雌。"},
{title:"满江红",author:"岳飞",dynasty:"宋",grade:"middle",
 text:"怒发冲冠，凭栏处、潇潇雨歇。抬望眼，仰天长啸，壮怀激烈。三十功名尘与土，八千里路云和月。莫等闲、白了少年头，空悲切。靖康耻，犹未雪。臣子恨，何时灭。驾长车，踏破贺兰山缺。壮志饥餐胡虏肉，笑谈渴饮匈奴血。待从头、收拾旧山河，朝天阙。"},
{title:"南乡子·登京口北固亭有怀",author:"辛弃疾",dynasty:"宋",grade:"middle",
 text:"何处望神州，满眼风光北固楼。千古兴亡多少事，悠悠。不尽长江滚滚流。年少万兜鍪，坐断东南战未休。天下英雄谁敌手，曹刘。生子当如孙仲谋。"},
{title:"破阵子·为陈同甫赋壮词以寄之",author:"辛弃疾",dynasty:"宋",grade:"middle",
 text:"醉里挑灯看剑，梦回吹角连营。八百里分麾下炙，五十弦翻塞外声，沙场秋点兵。马作的卢飞快，弓如霹雳弦惊。了却君王天下事，赢得生前身后名。可怜白发生。"},
{title:"江城子·密州出猎",author:"苏轼",dynasty:"宋",grade:"middle",
 text:"老夫聊发少年狂，左牵黄，右擎苍，锦帽貂裘，千骑卷平冈。为报倾城随太守，亲射虎，看孙郎。酒酣胸胆尚开张。鬓微霜，又何妨。持节云中，何日遣冯唐。会挽雕弓如满月，西北望，射天狼。"},
{title:"渔家傲·秋思",author:"范仲淹",dynasty:"宋",grade:"middle",
 text:"塞下秋来风景异，衡阳雁去无留意。四面边声连角起，千嶂里，长烟落日孤城闭。浊酒一杯家万里，燕然未勒归无计。羌管悠悠霜满地，人不寐，将军白发征夫泪。"},
{title:"相见欢",author:"李煜",dynasty:"五代",grade:"middle",
 text:"无言独上西楼，月如钩。寂寞梧桐深院锁清秋。剪不断，理还乱，是离愁。别是一般滋味在心头。"},
{title:"相见欢（林花谢了春红）",author:"李煜",dynasty:"五代",grade:"middle",
 text:"林花谢了春红，太匆匆。无奈朝来寒雨晚来风。胭脂泪，相留醉，几时重。自是人生长恨水长东。"},
{title:"无题",author:"李商隐",dynasty:"唐",grade:"middle",
 text:"相见时难别亦难，东风无力百花残。春蚕到死丝方尽，蜡炬成灰泪始干。晓镜但愁云鬓改，夜吟应觉月光寒。蓬山此去无多路，青鸟殷勤为探看。"},
{title:"卖炭翁",author:"白居易",dynasty:"唐",grade:"middle",
 text:"卖炭翁，伐薪烧炭南山中。满面尘灰烟火色，两鬓苍苍十指黑。卖炭得钱何所营，身上衣裳口中食。可怜身上衣正单，心忧炭贱愿天寒。夜来城外一尺雪，晓驾炭车辗冰辙。牛困人饥日已高，市南门外泥中歇。翩翩两骑来是谁，黄衣使者白衫儿。手把文书口称敕，回车叱牛牵向北。一车炭，千余斤，宫使驱将惜不得。半匹红纱一丈绫，系向牛头充炭直。"},
{title:"念奴娇·赤壁怀古",author:"苏轼",dynasty:"宋",grade:"middle",
 text:"大江东去，浪淘尽，千古风流人物。故垒西边，人道是，三国周郎赤壁。乱石穿空，惊涛拍岸，卷起千堆雪。江山如画，一时多少豪杰。遥想公瑾当年，小乔初嫁了，雄姿英发。羽扇纶巾，谈笑间，樯橹灰飞烟灭。故国神游，多情应笑我，早生华发。人生如梦，一尊还酹江月。"},
{title:"永遇乐·京口北固亭怀古",author:"辛弃疾",dynasty:"宋",grade:"middle",
 text:"千古江山，英雄无觅孙仲谋处。舞榭歌台，风流总被雨打风吹去。斜阳草树，寻常巷陌，人道寄奴曾住。想当年，金戈铁马，气吞万里如虎。元嘉草草，封狼居胥，赢得仓皇北顾。四十三年，望中犹记，烽火扬州路。可堪回首，佛狸祠下，一片神鸦社鼓。凭谁问：廉颇老矣，尚能饭否。"},
{title:"声声慢",author:"李清照",dynasty:"宋",grade:"middle",
 text:"寻寻觅觅，冷冷清清，凄凄惨惨戚戚。乍暖还寒时候，最难将息。三杯两盏淡酒，怎敌他、晚来风急。雁过也，正伤心，却是旧时相识。满地黄花堆积，憔悴损，如今有谁堪摘。守着窗儿，独自怎生得黑。梧桐更兼细雨，到黄昏、点点滴滴。这次第，怎一个愁字了得。"},
{title:"雨霖铃",author:"柳永",dynasty:"宋",grade:"middle",
 text:"寒蝉凄切，对长亭晚，骤雨初歇。都门帐饮无绪，留恋处，兰舟催发。执手相看泪眼，竟无语凝噎。念去去，千里烟波，暮霭沉沉楚天阔。多情自古伤离别，更那堪，冷落清秋节。今宵酒醒何处，杨柳岸，晓风残月。此去经年，应是良辰好景虚设。便纵有千种风情，更与何人说。"},
{title:"虞美人",author:"李煜",dynasty:"五代",grade:"middle",
 text:"春花秋月何时了，往事知多少。小楼昨夜又东风，故国不堪回首月明中。雕栏玉砌应犹在，只是朱颜改。问君能有几多愁，恰似一江春水向东流。"},
{title:"定风波",author:"苏轼",dynasty:"宋",grade:"middle",
 text:"莫听穿林打叶声，何妨吟啸且徐行。竹杖芒鞋轻胜马，谁怕，一蓑烟雨任平生。料峭春风吹酒醒，微冷，山头斜照却相迎。回首向来萧瑟处，归去，也无风雨也无晴。"},
{title:"登高",author:"杜甫",dynasty:"唐",grade:"middle",
 text:"风急天高猿啸哀，渚清沙白鸟飞回。无边落木萧萧下，不尽长江滚滚来。万里悲秋常作客，百年多病独登台。艰难苦恨繁霜鬓，潦倒新停浊酒杯。"},
{title:"锦瑟",author:"李商隐",dynasty:"唐",grade:"middle",
 text:"锦瑟无端五十弦，一弦一柱思华年。庄生晓梦迷蝴蝶，望帝春心托杜鹃。沧海月明珠有泪，蓝田日暖玉生烟。此情可待成追忆，只是当时已惘然。"},
{title:"琵琶行（节选）",author:"白居易",dynasty:"唐",grade:"middle",
 text:"浔阳江头夜送客，枫叶荻花秋瑟瑟。主人下马客在船，举酒欲饮无管弦。醉不成欢惨将别，别时茫茫江浸月。忽闻水上琵琶声，主人忘归客不发。千呼万唤始出来，犹抱琵琶半遮面。转轴拨弦三两声，未成曲调先有情。同是天涯沦落人，相逢何必曾相识。"},
{title:"蜀道难（节选）",author:"李白",dynasty:"唐",grade:"middle",
 text:"噫吁嚱，危乎高哉。蜀道之难，难于上青天。蚕丛及鱼凫，开国何茫然。尔来四万八千岁，不与秦塞通人烟。西当太白有鸟道，可以横绝峨眉巅。地崩山摧壮士死，然后天梯石栈相钩连。"},
{title:"将进酒",author:"李白",dynasty:"唐",grade:"middle",
 text:"君不见黄河之水天上来，奔流到海不复回。君不见高堂明镜悲白发，朝如青丝暮成雪。人生得意须尽欢，莫使金樽空对月。天生我材必有用，千金散尽还复来。烹羊宰牛且为乐，会须一饮三百杯。岑夫子，丹丘生，将进酒，杯莫停。与君歌一曲，请君为我倾耳听。钟鼓馔玉不足贵，但愿长醉不复醒。古来圣贤皆寂寞，惟有饮者留其名。"},
];

// ===== 工具函数 =====
var PUNCT = new Set(['，','。','！','？','、','；','：','"','"','（','）','《','》','【','】','—','…',',','!','?',';',':','(',')','.']);
var SENT_END = new Set(['。','！','？','\n']);

function shuffle(arr) {
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
  }
  return arr;
}

function splitByPunct(text) {
  var segs = [], start = 0;
  for (var i = 0; i < text.length; i++) {
    if (PUNCT.has(text[i])) {
      if (start < i) segs.push({ start: start, end: i, text: text.substring(start, i) });
      start = i + 1;
    }
  }
  if (start < text.length) segs.push({ start: start, end: text.length, text: text.substring(start) });
  return segs;
}

function getFiltered() {
  if (state.grade === 'all') return poems.slice();
  return poems.filter(function(p) { return p.grade === state.grade; });
}

// ===== 游戏状态 =====
var state = {
  currentPoem: null,
  gameMode: 'single',   // 'single' | 'multi' | 'choice'
  difficulty: 'easy',   // 'easy' | 'medium' | 'hard'
  grade: 'all',
  blanks: [],           // [{ phraseStart, phraseLen, answer }]
  blankSet: {},         // { rawIndex -> { blankIndex, charOffset } }
  choiceQ: null,        // choice mode question
  score: 0,
  total: 0,
  correct: 0,
  streak: 0,
  round: 1,
  checked: false,
  mode: 'idle'          // 'idle' | 'learn' | 'quiz'
};

// ===== 题目生成 =====
function selectSingleBlanks(text) {
  var segs = splitByPunct(text);
  var valid = segs.filter(function(s) { return s.text.length >= 2; });
  if (valid.length === 0) return [];
  shuffle(valid);
  var n;
  if (state.difficulty === 'easy') n = 1;
  else if (state.difficulty === 'medium') n = Math.max(1, Math.floor(valid.length * 0.3));
  else n = Math.max(1, Math.floor(valid.length * 0.5));
  n = Math.min(n, valid.length);
  var blanks = [];
  for (var i = 0; i < n; i++) {
    var seg = valid[i];
    var pos = seg.start + Math.floor(Math.random() * seg.text.length);
    blanks.push({ phraseStart: pos, phraseLen: 1, answer: text[pos] });
  }
  blanks.sort(function(a, b) { return a.phraseStart - b.phraseStart; });
  return blanks;
}

function selectMultiBlanks(text) {
  var segs = splitByPunct(text);
  var valid = segs.filter(function(s) { return s.text.length >= 3; });
  if (valid.length === 0) return [];
  shuffle(valid);
  var n;
  if (state.difficulty === 'easy') n = 1;
  else if (state.difficulty === 'medium') n = Math.max(1, Math.floor(valid.length * 0.3));
  else n = Math.max(1, Math.floor(valid.length * 0.5));
  n = Math.min(n, valid.length);
  var lenMin, lenMax;
  if (state.difficulty === 'easy') { lenMin = 2; lenMax = 2; }
  else if (state.difficulty === 'medium') { lenMin = 2; lenMax = 3; }
  else { lenMin = 2; lenMax = 4; }
  var blanks = [];
  for (var i = 0; i < n; i++) {
    var seg = valid[i];
    var pLen = Math.min(lenMin + Math.floor(Math.random() * (lenMax - lenMin + 1)), seg.text.length);
    var pos = seg.start + Math.floor(Math.random() * (seg.text.length - pLen + 1));
    blanks.push({ phraseStart: pos, phraseLen: pLen, answer: text.substring(pos, pos + pLen) });
  }
  blanks.sort(function(a, b) { return a.phraseStart - b.phraseStart; });
  return blanks;
}

function generateChoiceQ(text) {
  var chars = [];
  for (var i = 0; i < text.length; i++) {
    if (!PUNCT.has(text[i])) chars.push({ ch: text[i], idx: i });
  }
  if (chars.length === 0) return null;
  var target = chars[Math.floor(Math.random() * chars.length)];
  var pool = getFiltered();
  var d = [];
  var tries = 0;
  while (d.length < 3 && tries < 200) {
    var rp = pool[Math.floor(Math.random() * pool.length)];
    var rc = rp.text[Math.floor(Math.random() * rp.text.length)];
    if (!PUNCT.has(rc) && rc !== target.ch && d.indexOf(rc) === -1) d.push(rc);
    tries++;
  }
  var fb = ['之','乎','者','也','而','于','以','其','乃','则'];
  while (d.length < 3) {
    var f = fb[(d.length + tries) % fb.length];
    if (f !== target.ch && d.indexOf(f) === -1) d.push(f);
    else d.push(fb[(d.length + tries + 3) % fb.length]);
  }
  var opts = [target.ch].concat(d);
  shuffle(opts);
  return { targetCh: target.ch, targetIdx: target.idx, options: opts, answered: false, correct: false };
}

function buildBlankSet(blanks) {
  var s = {};
  for (var i = 0; i < blanks.length; i++) {
    for (var c = 0; c < blanks[i].phraseLen; c++) {
      s[blanks[i].phraseStart + c] = { blankIndex: i, charOffset: c };
    }
  }
  return s;
}

// ===== 渲染 =====
function setTitle(poem) {
  document.getElementById('poemTitle').textContent = poem.title;
  document.getElementById('poemAuthor').textContent = '[' + poem.dynasty + '] ' + poem.author;
}

function makeSpan(cls, text) {
  var s = document.createElement('span');
  s.className = cls;
  s.textContent = text;
  return s;
}

function renderQuiz() {
  var poem = state.currentPoem;
  if (!poem) return;
  setTitle(poem);
  var body = document.getElementById('poemBody');
  body.innerHTML = '';

  if (state.gameMode === 'choice') {
    renderChoice(body, poem);
  } else {
    state.blanks = (state.gameMode === 'single') ? selectSingleBlanks(poem.text) : selectMultiBlanks(poem.text);
    state.blankSet = buildBlankSet(state.blanks);
    renderFill(body, poem);
  }
}

function renderFill(body, poem) {
  var text = poem.text;
  var i = 0, lineDiv = null;

  while (i < text.length) {
    var ch = text[i];

    if (SENT_END.has(ch)) {
      if (lineDiv) {
        lineDiv.appendChild(makeSpan('char', ch));
        body.appendChild(lineDiv);
        lineDiv = null;
      }
      i++; continue;
    }
    if (ch === '\n') {
      if (lineDiv) body.appendChild(lineDiv);
      lineDiv = null;
      i++; continue;
    }

    if (!lineDiv) {
      lineDiv = document.createElement('div');
      lineDiv.className = 'line';
    }

    var bs = state.blankSet[i];
    if (bs && bs.charOffset === 0) {
      var blank = state.blanks[bs.blankIndex];
      var group = createBlankGroup(blank, bs.blankIndex);
      lineDiv.appendChild(group);
      i += blank.phraseLen;
    } else {
      lineDiv.appendChild(makeSpan('char', ch));
      i++;
    }
  }
  if (lineDiv) body.appendChild(lineDiv);
}

function createBlankGroup(blank, blankIndex) {
  var group = document.createElement('span');
  group.className = 'blank-group';
  group.dataset.blankIndex = blankIndex;

  for (var c = 0; c < blank.phraseLen; c++) {
    var b = document.createElement('span');
    b.className = 'blank';

    var input = document.createElement('input');
    input.type = 'text';
    input.maxLength = 1;
    input.placeholder = '_';
    input.dataset.blankIndex = blankIndex;
    input.dataset.charOffset = c;
    input.setAttribute('autocomplete', 'off');
    input.setAttribute('autocorrect', 'off');
    input.setAttribute('autocapitalize', 'off');
    input.setAttribute('spellcheck', 'false');

    input.addEventListener('input', onBlankInput);
    input.addEventListener('compositionend', onBlankInput);
    input.addEventListener('keydown', onBlankKeydown);
    input.addEventListener('focus', function(e) { e.target.select(); });

    b.appendChild(input);
    group.appendChild(b);
  }
  return group;
}

function renderChoice(body, poem) {
  var q = state.choiceQ;
  var text = poem.text;
  var i = 0, lineDiv = null;

  while (i < text.length) {
    var ch = text[i];

    if (SENT_END.has(ch)) {
      if (lineDiv) {
        lineDiv.appendChild(makeSpan('char', ch));
        body.appendChild(lineDiv);
        lineDiv = null;
      }
      i++; continue;
    }

    if (!lineDiv) {
      lineDiv = document.createElement('div');
      lineDiv.className = 'line';
    }

    if (i === q.targetIdx) {
      var bs = document.createElement('span');
      bs.className = 'blank';
      bs.id = 'choiceBlank';
      bs.style.cssText = 'border-bottom:2.5px solid var(--primary);padding:0 6px;min-width:2em;display:inline-block;text-align:center;font-weight:600;';
      bs.textContent = '____';
      lineDiv.appendChild(bs);
      i++;
    } else if (!PUNCT.has(ch)) {
      lineDiv.appendChild(makeSpan('char', ch));
      i++;
    } else {
      lineDiv.appendChild(makeSpan('char', ch));
      i++;
    }
  }
  if (lineDiv) body.appendChild(lineDiv);

  var optsDiv = document.createElement('div');
  optsDiv.className = 'choice-options';
  optsDiv.id = 'choiceOptions';

  for (var o = 0; o < q.options.length; o++) {
    var btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = q.options[o];
    btn.dataset.optionIndex = o;
    btn.addEventListener('click', onChoiceClick);
    optsDiv.appendChild(btn);
  }
  body.appendChild(optsDiv);
}

// ===== 事件处理（全部从 dataset 读数据，零闭包）=====
function onBlankInput(e) {
  var el = e.target;
  var val = el.value.trim();
  if (!val) {
    el.parentElement.classList.remove('filled', 'correct', 'wrong');
    // Also clear any answer-text spans
    var at = el.parentElement.querySelector('.answer-text');
    if (at) at.remove();
    return;
  }

  var bIdx = parseInt(el.dataset.blankIndex, 10);
  var cOff = parseInt(el.dataset.charOffset, 10);
  var blank = state.blanks[bIdx];
  var group = el.closest('.blank-group');
  var inputs = group.querySelectorAll('input');

  // Distribute chars
  var chars = val.split('');
  var fillIdx = cOff;
  for (var c = 0; c < chars.length && fillIdx < blank.phraseLen; c++, fillIdx++) {
    inputs[fillIdx].value = chars[c];
    inputs[fillIdx].parentElement.classList.add('filled');
  }

  // Clear source if distributed
  if (chars.length > 1) el.value = '';

  // Instant per-char feedback
  for (var j = 0; j < blank.phraseLen; j++) {
    var inp = inputs[j];
    var uc = inp.value;
    var cc = blank.answer[j];
    var bel = inp.parentElement;
    bel.classList.remove('correct', 'wrong');
    // Remove old answer spans
    var oldAns = bel.querySelector('.answer-text');
    if (oldAns) oldAns.remove();

    if (uc === cc) {
      bel.classList.add('correct');
    } else if (uc) {
      bel.classList.add('wrong');
      var ans = document.createElement('span');
      ans.className = 'answer-text';
      ans.textContent = cc;
      bel.appendChild(ans);
    }
  }

  // Auto-focus next
  if (fillIdx < blank.phraseLen) {
    inputs[fillIdx].focus();
  }
}

function onBlankKeydown(e) {
  if (e.key === 'Enter') {
    checkAnswer();
    e.preventDefault();
    return;
  }
  if (e.key === 'Backspace' && !e.target.value) {
    focusPrevBlank(e.target);
    e.preventDefault();
  }
  if (e.key === 'ArrowLeft') { focusPrevBlank(e.target); e.preventDefault(); }
  if (e.key === 'ArrowRight') { focusNextBlank(e.target); e.preventDefault(); }
}

function focusPrevBlank(el) {
  var all = document.querySelectorAll('.blank-group input:not([disabled])');
  var idx = Array.prototype.indexOf.call(all, el);
  if (idx > 0) all[idx - 1].focus();
}

function focusNextBlank(el) {
  var all = document.querySelectorAll('.blank-group input:not([disabled])');
  var idx = Array.prototype.indexOf.call(all, el);
  if (idx < all.length - 1) all[idx + 1].focus();
}

function onChoiceClick(e) {
  var btn = e.target;
  var optIdx = parseInt(btn.dataset.optionIndex, 10);
  var q = state.choiceQ;
  if (q.answered) return;
  q.answered = true;
  q.correct = (q.options[optIdx] === q.targetCh);

  var blankSpan = document.getElementById('choiceBlank');
  blankSpan.textContent = q.options[optIdx];

  if (q.correct) {
    blankSpan.classList.add('correct');
    btn.classList.add('choice-correct');
    state.correct++;
    state.score += scoreMul();
    state.streak++;
    showReward();
  } else {
    blankSpan.classList.add('wrong');
    btn.classList.add('choice-wrong');
    var btns = document.querySelectorAll('.choice-btn');
    for (var i = 0; i < btns.length; i++) {
      if (btns[i].textContent === q.targetCh) btns[i].classList.add('choice-correct');
    }
    state.streak = 0;
  }
  state.total++;
  updateStats();
  var btns = document.querySelectorAll('.choice-btn');
  for (var i = 0; i < btns.length; i++) btns[i].disabled = true;
  setTimeout(function() { document.getElementById('nextBtn').disabled = false; }, 1200);
}

// ===== 计分 =====
function scoreMul() {
  if (state.difficulty === 'easy') return 10;
  if (state.difficulty === 'medium') return 20;
  return 30;
}

function checkAnswer() {
  if (state.checked || state.gameMode === 'choice') return;
  state.checked = true;

  var correctCount = 0;
  for (var i = 0; i < state.blanks.length; i++) {
    var b = state.blanks[i];
    var group = document.querySelector('.blank-group[data-blank-index="' + i + '"]');
    if (!group) continue;
    var inputs = group.querySelectorAll('input');
    var userAns = '';
    for (var j = 0; j < inputs.length; j++) userAns += inputs[j].value;

    state.total++;
    if (userAns === b.answer) {
      correctCount++;
      state.correct++;
      state.score += scoreMul();
      state.streak++;
      for (var j = 0; j < inputs.length; j++) {
        inputs[j].parentElement.classList.remove('wrong');
        inputs[j].parentElement.classList.add('correct');
      }
    } else {
      state.streak = 0;
      for (var j = 0; j < inputs.length; j++) {
        inputs[j].disabled = true;
        if (inputs[j].value !== b.answer[j]) {
          inputs[j].parentElement.classList.remove('filled');
          inputs[j].parentElement.classList.add('wrong');
          var ans = document.createElement('span');
          ans.className = 'answer-text';
          ans.textContent = b.answer[j];
          inputs[j].parentElement.appendChild(ans);
        } else {
          inputs[j].parentElement.classList.add('correct');
        }
      }
    }
  }

  updateStats();
  showResult(correctCount, state.blanks.length);
  if (correctCount === state.blanks.length && state.blanks.length > 0) showReward();

  document.getElementById('nextBtn').disabled = false;
  document.getElementById('checkBtn').disabled = true;
  document.getElementById('hintBtn').disabled = true;
}

function updateStats() {
  document.getElementById('roundNum').textContent = state.round;
  document.getElementById('scoreNum').textContent = state.score;
  var pct = state.total > 0 ? Math.round(state.correct / state.total * 100) : 0;
  document.getElementById('accuracyNum').textContent = pct + '%';
  document.getElementById('streakNum').textContent = state.streak;
}

function showResult(cc, total) {
  var r = document.getElementById('result');
  var ratio = total > 0 ? cc / total : 0;
  r.className = 'result show';
  if (ratio >= 0.8) {
    r.classList.add('pass');
    r.textContent = '太棒了！答对 ' + cc + '/' + total + ' 个！';
  } else if (ratio >= 0.5) {
    r.classList.add('pass');
    r.textContent = '不错！答对 ' + cc + '/' + total + ' 个，继续加油！';
  } else {
    r.classList.add('fail');
    r.textContent = '答对 ' + cc + '/' + total + ' 个，多读多练！';
  }
}

// ===== 奖励动画 =====
function showReward() {
  if (state.streak < 1) return;
  var msgs = [
    { icon: '👍', text: '太棒了！', sub: '连续答对 ' + state.streak + ' 题！' },
    { icon: '🎉', text: '你真棒！', sub: '势不可挡！' },
    { icon: '⭐', text: '优秀！', sub: '诗词小达人！' },
    { icon: '🔥', text: state.streak + ' 连击！', sub: '继续保持！' },
    { icon: '🏆', text: '满分！', sub: '你是古诗词大师！' },
  ];
  var m = msgs[Math.floor(Math.random() * msgs.length)];
  var ov = document.getElementById('rewardOverlay');
  document.getElementById('rewardIcon').textContent = m.icon;
  document.getElementById('rewardText').textContent = m.text;
  document.getElementById('rewardSub').textContent = m.sub;
  ov.classList.add('show');
  spawnParticles();
  setTimeout(function() {
    ov.classList.remove('show');
    var ps = document.querySelectorAll('.particle');
    for (var i = 0; i < ps.length; i++) ps[i].remove();
  }, 2000);
}

function spawnParticles() {
  var colors = ['#e74c3c','#f39c12','#27ae60','#3498db','#9b59b6','#e91e63','#ff9800','#4caf50'];
  for (var i = 0; i < 30; i++) {
    var p = document.createElement('div');
    p.className = 'particle';
    p.style.left = (Math.random() * 100) + 'vw';
    p.style.top = (Math.random() * 60) + 'vh';
    p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
    var sz = (6 + Math.random() * 10) + 'px';
    p.style.width = sz;
    p.style.height = sz;
    p.style.setProperty('--dx', (Math.random() * 200 - 100) + 'px');
    p.style.setProperty('--dy', (100 + Math.random() * 200) + 'px');
    p.style.animationDelay = (Math.random() * 0.5) + 's';
    document.body.appendChild(p);
  }
}

// ===== 提示 =====
function showHint() {
  if (state.checked) return;
  if (state.gameMode === 'choice') {
    var btns = document.querySelectorAll('.choice-btn:not(.choice-correct):not(.choice-wrong)');
    for (var i = 0; i < btns.length; i++) {
      if (btns[i].textContent !== state.choiceQ.targetCh) {
        btns[i].style.opacity = '0.3';
        btns[i].disabled = true;
        break;
      }
    }
    state.score = Math.max(0, state.score - 5);
    updateStats();
    return;
  }
  for (var i = 0; i < state.blanks.length; i++) {
    var b = state.blanks[i];
    var group = document.querySelector('.blank-group[data-blank-index="' + i + '"]');
    if (!group) continue;
    var inputs = group.querySelectorAll('input');
    for (var j = 0; j < inputs.length; j++) {
      if (!inputs[j].value) {
        inputs[j].value = b.answer[j];
        inputs[j].parentElement.classList.add('filled', 'correct');
        state.score = Math.max(0, state.score - 5);
        updateStats();
        return;
      }
    }
  }
}

// ===== 学习模式 =====
function startLearn() {
  var pool = getFiltered();
  if (pool.length === 0) { alert('没有可用的诗词'); return; }
  state.currentPoem = pool[Math.floor(Math.random() * pool.length)];
  state.mode = 'learn';

  setTitle(state.currentPoem);
  var body = document.getElementById('poemBody');
  body.innerHTML = '';
  body.classList.add('learn-mode');

  var text = state.currentPoem.text;
  var parts = text.split(/([。！？，\n])/);
  var tIdx = 0;
  for (var p = 0; p < parts.length; p++) {
    var part = parts[p];
    if (!part) continue;
    if (/^[。！？，\n]+$/.test(part)) { tIdx += part.length; continue; }
    var lineDiv = document.createElement('div');
    lineDiv.className = 'line';
    for (var i = 0; i < part.length; i++) {
      var span = document.createElement('span');
      span.className = 'char';
      span.textContent = part[i];
      span.style.animationDelay = (tIdx * 0.03) + 's';
      lineDiv.appendChild(span);
      tIdx++;
    }
    body.appendChild(lineDiv);
  }

  var speakBtn = document.createElement('button');
  speakBtn.className = 'speak-btn';
  speakBtn.textContent = '🔊 朗读';
  speakBtn.onclick = function() { recitePoem(text, speakBtn); };
  body.appendChild(speakBtn);

  document.getElementById('hintText').textContent = '点击「朗读」听诗词朗诵，点击「下一题」换一首';
  document.getElementById('checkBtn').disabled = true;
  document.getElementById('hintBtn').disabled = true;
  document.getElementById('nextBtn').disabled = false;
}

function recitePoem(text, btn) {
  if (!('speechSynthesis' in window)) {
    alert('您的浏览器不支持语音合成');
    return;
  }
  window.speechSynthesis.cancel();
  var utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'zh-CN';
  utter.rate = 0.75;
  var voices = window.speechSynthesis.getVoices();
  for (var i = 0; i < voices.length; i++) {
    if (voices[i].lang.indexOf('zh') === 0) { utter.voice = voices[i]; break; }
  }
  if (btn) { btn.classList.add('speaking'); btn.textContent = '🔊 朗读中...'; }
  utter.onend = function() { if (btn) { btn.classList.remove('speaking'); btn.textContent = '🔊 朗读'; } };
  utter.onerror = function() { if (btn) { btn.classList.remove('speaking'); btn.textContent = '🔊 朗读'; } };
  window.speechSynthesis.speak(utter);
}
if ('speechSynthesis' in window) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = function() { window.speechSynthesis.getVoices(); };
}

// ===== 下一题 =====
function nextRound() {
  if (state.mode === 'learn') { startLearn(); return; }
  state.round++;
  state.checked = false;
  var pool = getFiltered();
  if (pool.length === 0) { alert('没有可用的诗词'); return; }

  // Pick different poem if possible
  var newPoem;
  var tries = 0;
  do {
    newPoem = pool[Math.floor(Math.random() * pool.length)];
    tries++;
  } while (newPoem === state.currentPoem && pool.length > 1 && tries < 10);
  state.currentPoem = newPoem;

  if (state.gameMode === 'choice') {
    state.choiceQ = generateChoiceQ(state.currentPoem.text);
  } else {
    state.blanks = [];
    state.blankSet = {};
  }

  renderQuiz();

  if (state.gameMode === 'choice') {
    document.getElementById('hintText').textContent = '选择正确的字填入空白处';
    document.getElementById('checkBtn').disabled = true;
    document.getElementById('hintBtn').disabled = false;
  } else {
    document.getElementById('hintText').textContent = '共 ' + state.blanks.length + ' 个空，点击「检查答案」提交';
    document.getElementById('checkBtn').disabled = false;
    document.getElementById('hintBtn').disabled = false;
  }
  document.getElementById('nextBtn').disabled = true;
  document.getElementById('result').className = 'result';

  updateStats();

  // Focus first input
  var firstInput = document.querySelector('.blank-group input');
  if (firstInput) setTimeout(function() { firstInput.focus(); }, 300);
}

// ===== 背景音乐 =====
var bgm = { ctx: null, playing: false, loopId: null, gainNode: null };
var pentatonic = [293.66, 329.63, 369.99, 440.00, 493.88];
var melody = [
  {n:0,d:.6},{n:2,d:.6},{n:4,d:1},{n:3,d:.6},{n:2,d:.6},{n:0,d:1},
  {n:1,d:.6},{n:2,d:.6},{n:4,d:.6},{n:3,d:.6},{n:2,d:1},{n:0,d:1},
  {n:-5,d:.6},{n:-3,d:.6},{n:0,d:1},{n:2,d:.6},{n:4,d:.6},{n:3,d:1.2},
];

function initBGM() {
  bgm.ctx = new (window.AudioContext || window.webkitAudioContext)();
  bgm.gainNode = bgm.ctx.createGain();
  bgm.gainNode.gain.value = 0.12;
  bgm.gainNode.connect(bgm.ctx.destination);
}

function playNote(freq, start, dur) {
  if (!bgm.ctx || !bgm.playing) return;
  var osc = bgm.ctx.createOscillator();
  var env = bgm.ctx.createGain();
  osc.type = 'sine';
  osc.frequency.value = freq;
  env.gain.setValueAtTime(0, start);
  env.gain.linearRampToValueAtTime(0.25, start + 0.05);
  env.gain.linearRampToValueAtTime(0.15, start + dur * 0.7);
  env.gain.linearRampToValueAtTime(0, start + dur);
  osc.connect(env);
  env.connect(bgm.gainNode);
  osc.start(start);
  osc.stop(start + dur);
}

function scheduleLoop() {
  if (!bgm.playing) return;
  var now = bgm.ctx.currentTime;
  var t = now + 0.1, total = 0;
  for (var i = 0; i < melody.length; i++) {
    var item = melody[i];
    var ni = item.n;
    var freq;
    if (ni < 0) { freq = pentatonic[0] / Math.pow(2, Math.abs(ni) / 12); }
    else { freq = pentatonic[ni % 5]; if (ni >= 5) freq *= Math.pow(2, Math.floor(ni / 5)); }
    playNote(freq, t, item.d * 0.85);
    t += item.d;
    total += item.d;
  }
  bgm.loopId = setTimeout(scheduleLoop, total * 1000 - 100);
}

function toggleBGM() {
  if (!bgm.ctx) initBGM();
  if (bgm.ctx.state === 'suspended') bgm.ctx.resume();
  bgm.playing = !bgm.playing;
  var btn = document.getElementById('bgmBtn');
  if (bgm.playing) {
    btn.textContent = '🎵'; btn.classList.add('bgm-on'); scheduleLoop();
  } else {
    btn.textContent = '🔇'; btn.classList.remove('bgm-on'); clearTimeout(bgm.loopId);
  }
}

// ===== 事件绑定 =====
document.getElementById('learnBtn').addEventListener('click', startLearn);
document.getElementById('checkBtn').addEventListener('click', checkAnswer);
document.getElementById('nextBtn').addEventListener('click', nextRound);
document.getElementById('hintBtn').addEventListener('click', showHint);
document.getElementById('bgmBtn').addEventListener('click', toggleBGM);

// Mode buttons
var modeBtns = document.querySelectorAll('.mode-btn');
for (var i = 0; i < modeBtns.length; i++) {
  (function(btn) {
    btn.addEventListener('click', function() {
      for (var j = 0; j < modeBtns.length; j++) modeBtns[j].classList.remove('active');
      btn.classList.add('active');
      state.gameMode = btn.dataset.mode;
      // Reset round when mode changes
      state.round = 1;
      state.checked = false;
      state.mode = 'quiz';
      nextRound();
    });
  })(modeBtns[i]);
}

// Difficulty buttons
var diffBtns = document.querySelectorAll('.diff-btn');
for (var i = 0; i < diffBtns.length; i++) {
  (function(btn) {
    btn.addEventListener('click', function() {
      for (var j = 0; j < diffBtns.length; j++) diffBtns[j].classList.remove('active');
      btn.classList.add('active');
      state.difficulty = btn.dataset.diff;
    });
  })(diffBtns[i]);
}

// Grade buttons
var gradeBtns = document.querySelectorAll('.grade-btn');
for (var i = 0; i < gradeBtns.length; i++) {
  (function(btn) {
    btn.addEventListener('click', function() {
      for (var j = 0; j < gradeBtns.length; j++) gradeBtns[j].classList.remove('active');
      btn.classList.add('active');
      state.grade = btn.dataset.grade;
    });
  })(gradeBtns[i]);
}
